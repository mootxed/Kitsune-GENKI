name: Deploy to GitHub Pages

# Триггер: срабатывает при push в ветку main
on:
  push:
    branches:
      - main

# Устанавливаем права на запись для GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # Шаг 3: Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci
      
      # Шаг 4: Собираем проект
      - name: Build project
        run: npm run build
      
      # Шаг 5: Деплоим в ветку gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true